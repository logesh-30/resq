name: ambulance_app
description: Smart Emergency Ambulance Dispatch App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  geolocator: ^13.0.0
  google_maps_flutter: ^2.9.0
  geocoding: ^3.0.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  uuid: ^4.5.3
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 23